name: Build

on:
push:
pull_request:

jobs:
build-ubuntu:
runs-on: ubuntu-24.04

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        libasound2-dev \
        libx11-dev \
        libxrandr-dev \
        libxi-dev \
        libgl1-mesa-dev \
        libglu1-mesa-dev \
        libxcursor-dev \
        libxinerama-dev \
        libwayland-dev \
        libxkbcommon-dev

  - name: Configure
    run: |
      cmake -B build -D CMAKE_BUILD_TYPE=Release

  - name: Build
    run: |
      cmake --build build --parallel

  - name: Verify outputs
    run: |
      ls -l build/
      file build/megattt
      file build/megattt-server

  - name: Upload megattt
    uses: actions/upload-artifact@v4
    with:
      name: megattt-ubuntu24
      path: build/megattt

  - name: Upload megattt-server
    uses: actions/upload-artifact@v4
    with:
      name: megattt-server-ubuntu24
      path: build/megattt-server
